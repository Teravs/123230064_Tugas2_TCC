<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Web Untuk Menyimpan Tulisanmu</h1>
    <div id="notesList" class="notes"></div>
  </div>

  <button class="fab" onclick="openModal()">+</button>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Tambah Catatan</h2>

      <input type="hidden" id="noteId">
      <input type="text" id="judul" placeholder="Judul catatan">
      <textarea id="isi" placeholder="Isi catatan"></textarea>

      <div class="modal-actions">
        <button onclick="closeModal()" class="btn-cancel">Batal</button>
        <button onclick="saveNote()">Simpan</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden">
    <div class="modal-content">
      <h2>Hapus Catatan?</h2>
      <p>Yakin mau hapus ini?</p>

      <div class="modal-actions">
        <button onclick="closeDeleteModal()" class="btn-cancel">Batal</button>
        <button onclick="confirmDelete()">Hapus</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
